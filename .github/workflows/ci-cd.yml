name: Wine Article Aggregator CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests
        run: npm test
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --production
      
      - name: Build Docker image
        run: |
          docker build -t wine-aggregator:${{ github.sha }} .
          docker tag wine-aggregator:${{ github.sha }} wine-aggregator:latest
      
      - name: Login to Docker Hub
        if: secrets.DOCKER_HUB_TOKEN
        run: echo ${{ secrets.DOCKER_HUB_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin
      
      - name: Push to Docker Hub
        if: secrets.DOCKER_HUB_TOKEN
        run: |
          docker push wine-aggregator:${{ github.sha }}
          docker push wine-aggregator:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /app/wine-aggregator
            docker-compose pull
            docker-compose up -d
            docker system prune -f

  notify:
    needs: [test, build]
    runs-on: ubuntu-latest
    
    steps:
      - name: Send notification
        if: always()
        run: |
          STATUS="✅ Tests passed"
          if [ "${{ needs.test.result }}" != "success" ]; then
            STATUS="❌ Tests failed"
          fi
          echo "::set-output name=status::$STATUS"
          echo "$STATUS"
